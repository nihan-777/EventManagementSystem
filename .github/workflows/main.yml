name: CI - Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore packages
        run: dotnet restore EventManagementSystem/EventManagementSystem.csproj

      - name: Build
        run: dotnet build EventManagementSystem/EventManagementSystem.csproj --configuration Release --no-restore
